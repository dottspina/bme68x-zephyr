# Logging configuration.
# See https://docs.python.org/3.13/library/logging.config.html

[loggers]
keys=root,zbme68x

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_zbme68x]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=zbme68x
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stderr,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=simpleFormatter
args=("zbme68x.log", "w", "utf-8")

[formatter_simpleFormatter]
format=%(asctime)s - %(levelname)s - %(message)s
